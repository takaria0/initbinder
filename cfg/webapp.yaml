paths:
  antigen_category_map: targets_catalog/antigen_category_map.tsv
cluster:
  ssh_config_alias: null
  remote_root: null
  target_root: null
  control_path: null
  control_persist: 600000
  conda_activate: "conda activate takashi"
  rsync_path: rsync
  sbatch_path: sbatch
  squeue_path: squeue
  sacct_path: sacct
  pymol_path: pymol
  assess_partition: standard          # optional, match your CPU queue
  assess_account: ccl_lab         # optional
  assess_time_minutes: 600
  assess_mem_gb: 4
  assess_cpus: 1
  debug: false
  boltzgen:
    conda_activate: "conda activate bg"
    partition: gpu
    account: ccl_lab_gpu
    gpus: A30:1
    cpus: 8
    mem_gb: 64
    time_hours: 12
    scripts_dir: lib/tools/boltzgen
    launcher_dir: lib/tools/launchers
    protocol: nanobody-anything
    cache_dir: null
    output_root: null
    extra_run_args: []
    nanobody_scaffolds: []
